<!-- Minimal-JS doctor availability page based on your project styling -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Availability</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family:'Inter',sans-serif; }
        .slot{padding:.6rem;border:1px solid #d1d5db;border-radius:.375rem;text-align:center;font-weight:500;cursor:pointer;}
        .slot-date{background:#f3f4f6;color:#111827;cursor:default;}
        .slot-available{background:#f0fdf4;color:#166534;border-color:#86efac;}
        .slot-unavailable{background:#fef2f2;color:#991b1b;border-color:#fca5a5;}
        .slot-selected{background:#2563eb!important;color:white!important;border-color:#1d4ed8!important;}
    </style>
</head>
<body class="bg-gray-100">

<header class="bg-white shadow-sm">
    <div class="max-w-7xl mx-auto px-4 py-4 text-2xl font-bold">Patient Dashboard</div>
</header>

<main class="max-w-7xl mx-auto px-4 py-8">
    <div class="bg-white rounded-lg shadow-md p-6 md:flex">

        <!-- Doctor Info -->
        <div class="md:w-1/3 md:pr-8 border-b md:border-b-0 md:border-r border-gray-200 pb-6 md:pb-0">
            <img src="https://placehold.co/300x300" class="w-32 h-32 rounded-full mx-auto" />
            <h2 class="text-2xl font-bold text-center mt-4">{{ doctor.user.full_name }}</h2>
            <p class="text-center text-gray-600">{{ doctor.specialization }}</p>
            <p class="text-sm text-gray-500 mt-4">{{ doctor.bio }}</p>
        </div>

        <!-- Availability -->
        <div class="md:w-2/3 md:pl-8 pt-6 md:pt-0">
            <h3 class="text-xl font-semibold">Book Appointment</h3>
            <p class="text-sm text-gray-600">Select an available slot.</p>

            <div id="grid" class="grid grid-cols-3 gap-3 mt-6">
                <div class="font-semibold text-center">Date</div>
                <div class="font-semibold text-center">Before Lunch</div>
                <div class="font-semibold text-center">After Lunch</div>

                {% for day in week %}
                    <div class="slot slot-date">{{ day.date }}<br><span class='text-sm'>{{ day.day }}</span></div>

                    <div class="slot {% if day.morning %}slot-available{% else %}slot-unavailable{% endif %}"
                         data-date="{{ day.date }}" data-time="{{ day.morning_time }}" data-day="{{ day.day }}">
                        {{ day.morning_time }}
                    </div>

                    <div class="slot {% if day.evening %}slot-available{% else %}slot-unavailable{% endif %}"
                         data-date="{{ day.date }}" data-time="{{ day.evening_time }}" data-day="{{ day.day }}">
                        {{ day.evening_time }}
                    </div>
                {% endfor %}
            </div>

            <form method="POST" action="{{ url_for('book_slot', doctor_id=doctor.id) }}" class="mt-6">
                <input type="hidden" name="date" id="dateField">
                <input type="hidden" name="time" id="timeField">
                <button id="bookBtn" disabled class="w-full md:w-auto px-6 py-3 bg-blue-600 text-white rounded-md disabled:bg-gray-400">Book Slot</button>
            </form>

        </div>
    </div>
</main>

<script>
let selected=null;
document.getElementById('grid').addEventListener('click',e=>{
    let s=e.target.closest('.slot');
    if(!s||!s.dataset.date||s.classList.contains('slot-unavailable'))return;

    if(selected)selected.classList.remove('slot-selected');
    s.classList.add('slot-selected');
    selected=s;

    document.getElementById('dateField').value=s.dataset.date;
    document.getElementById('timeField').value=s.dataset.time;
    document.getElementById('bookBtn').disabled=false;
});
</script>

</body>
</html>
