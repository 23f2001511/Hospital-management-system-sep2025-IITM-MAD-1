<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Patient Register | HMS Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../../static/css/style.css">
    <link rel="stylesheet" href="../../static/css/auth/resister.css">

</head>
<body>



<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top">
    <div class="container">
      <a class="navbar-brand fw-bold text-primary" href="#">
        <img src="../../static/img/mad1.png" alt="HMS Logo" width="60" height="35" class="me-2 rounded-circle">
        <i class="bi bi-heart-pulse-fill me-2"></i>HMS Portal
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link " href="{{url_for('main.home')}}">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="#">About</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Contact us</a></li>
          
        </ul>

        <div class="d-flex align-items-center">
          <!-- Login  -->
          <button class="btn btn-outline-primary" onclick="window.location.href='{{ url_for('main.login') }}'">
            <i class="bi  me-1"></i>Login
          </button>
        </div>
      </div>
    </div>
  </nav>


  <!-- Patient Register Form -->
  <div class="container" style="margin-top: 100px; margin-bottom: 50px;">
    <div class="form-container bg-white shadow-lg p-4">
      <div class="text-center mb-4">
        <img src="../../static/img/img.jpg" alt="Logo" class="logo-img">
        <h4 class="mt-3">Patient Registration</h4>
        <p class="text-muted">Create your account to access the HMS Portal</p>
      </div>

      <form id="patientRegisterForm" action="{{url_for('main.register')}}" method="POST">
        <div class="form-floating mb-3">
          <input type="text" class="form-control" id="registerName" name="full_name" placeholder="John Doe" required>
          <label for="registerName" ><i class="bi bi-person-fill me-2"></i>Full Name</label>
        </div>



 <!--       <div class="form-floating mb-3">
          <input type="text" class="form-control" id="registerUsername" placeholder="username" required>
          <label for="registerUsername"><i class="bi bi-person-vcard-fill me-2"></i>Username</label>
        </div> 
  -->



        <div class="form-floating mb-3">
          <input type="email" class="form-control" id="registerEmail" name="email" placeholder="name@example.com" required>
          <label for="registerEmail" ><i class="bi bi-envelope-fill me-2"></i>Email Address</label>
        </div>

        <div class="form-floating mb-3">
          <input type="password" class="form-control" id="registerPassword" name="password" placeholder="Password" required>
          <label for="registerPassword" ><i class="bi bi-lock-fill me-2"></i>Create Password</label>
        </div>

        <div class="form-floating mb-3">
          <input type="tel" class="form-control" id="registerPhone"  name="phone_number" placeholder="9876543210" pattern="[0-9]{10}" required>
          <label for="registerPhone" ><i class="bi bi-telephone-fill me-2"></i>Phone Number</label>
        </div>

        <div class="form-floating mb-3">
          <input type="number" class="form-control" name="age" id="registerAge" placeholder="Age" min="0" max="120" required>
          <label for="registerAge" ><i class="bi bi-calendar-heart-fill me-2"></i>Age</label>
        </div>

        <div class="form-floating mb-3">
          <select class="form-select" id="registerGender" name="gender" required>
            <option selected disabled value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
          <label for="registerGender" ><i class="bi bi-gender-ambiguous me-2"></i>Gender</label>
        </div>


  <!--
        <div class="form-floating mb-3">
          <textarea class="form-control" placeholder="Enter your address" id="registerAddress" style="height: 100px" required></textarea>
          <label for="registerAddress"><i class="bi bi-geo-alt-fill me-2"></i>Address</label>
        </div>
  -->

        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="termsCheck" required>
          <label class="form-check-label" for="termsCheck">
            I agree to the <a href="#" class="form-link">Terms & Conditions</a>
          </label>
        </div>

        <button type="submit" class="btn btn-primary w-100 btn-lg">Register as Patient</button>

        <div class="text-center mt-3">
          <p>Already have an account? <a href="{{url_for('main.login')}}" class="form-link">Login here</a></p>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
