<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Details | HMS Portal</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stlesheet" href="../../static/css/style.css">
  <link rel="stylesheet" href="../../static/css/admin/manage_patient.css">

  <style>
    body {
      background-color: #f4f7f9;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      padding-top: 80px;
    }

   
    .footer {
      text-align: center;
      margin: 25px 0;
      color: #777;
    }
  </style>
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top">
    <div class="container">
      <a class="navbar-brand fw-bold text-primary" href="#">
        <img src="../../static/img/mad1.png" alt="HMS Logo" width="60" height="35" class="me-2 rounded-circle">
        <i class="bi bi-heart-pulse-fill me-2"></i>HMS Portal
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Right side links -->
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link fw-bold text-secondary" href="#">Dashboard</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Patient Profile Card -->
  <div class="patient-card">
    <div class="patient-header">
      <div class="patient-info">
        <img src="../../static/img/patient1.jpeg" alt="Patient Photo" class="patient-img">
        <div>
          <div class="patient-name">Mr. Rohit Sharma</div>
          <div class="badge-status">Active Patient</div>
          <p class="mt-2 mb-0 text-muted">Age: 35</p>
          <p class="mb-0 text-muted">Email: rohit@example.com</p>
          <p class="mb-0 text-muted">Phone: +91 9876543210</p>
        </div>
      </div>

      <div class="button-group">
        <button class="btn-edit me-2"><i class="bi bi-pencil-square"></i> Edit</button>
        <button class="btn-delete"><i class="bi bi-trash"></i> Delete</button>
        <button class="btn-blacklist"><i class="bi bi-slash-circle"></i> Blacklist</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-box">
      <div class="stats-item">
        <h4>15</h4>
        <p>Appointments</p>
      </div>
      <div class="stats-item">
        <h4>3</h4>
        <p>Pending Bills</p>
      </div>
      <div class="stats-item">
        <h4>2</h4>
        <p>Visits This Month</p>
      </div>
    </div>

    <!-- Appointment Table -->
    <h5 class="mt-4 mb-3 text-primary">Upcoming Appointments</h5>
    <table>
      <tr>
        <th>#</th>
        <th>Doctor Name</th>
        <th>Appointment Date</th>
        <th>Time</th>
        <th>Type</th>
        <th>Action</th>
      </tr>
      <tr>
