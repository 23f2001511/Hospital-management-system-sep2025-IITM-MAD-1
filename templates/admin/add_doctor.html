<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Doctor | HMS Portal</title>

  <!-- Bootstrap & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Custom Styles -->
  <link rel="stylesheet" href="../../static/css/admin/add_doc.css" />
  <link rel="stylesheet" href="../../static/css/style.css" />
</head>
<body>
  <div class="wrapper">
    <!-- ===== SIDEBAR ===== -->
    <nav id="sidebar">
      <div class="sidebar-header text-center py-3 border-bottom">
        <a href="#" class="navbar-brand fw-bold d-flex align-items-center justify-content-center text-primary">
          <img src="../../static/img/mad1.png" alt="HMS Logo" class="me-2 rounded-circle" style="height: 35px;" />
          <span><i class="bi bi-heart-pulse-fill me-2"></i>HMS Portal</span>
        </a>
      </div>
      <ul class="list-unstyled components mt-3">
        <li class="active"><a href="{{url_for('main.admin_dashboard')}}"><i class="bi bi-grid-1x2-fill me-2"></i>Dashboard</a></li>
        <li><a href="{{url_for('main.all_doctors')}}"><i class="bi bi-person-badge-fill me-2"></i>Doctors</a></li>
        <li><a href="{{url_for('main.all_patients')}}"><i class="bi bi-people-fill me-2"></i>Patients</a></li>
        <li><a href="{{url_for('main.all_appointments')}}"><i class="bi bi-calendar-check-fill me-2"></i>Appointments</a></li>
  
      </ul>
    </nav>

    <!-- ===== MAIN CONTENT ===== -->
    <div id="content">
      <!-- Top Navbar -->
      <nav class="top-navbar d-flex justify-content-between align-items-center mb-4 px-3 py-2 shadow-sm">
        <h5 class="mb-0 fw-semibold">Add New Doctor</h5>
        <div class="dropdown">
          <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" role="button" data-bs-toggle="dropdown">
              <div class="text-end me-2 d-none d-md-block">
                  <div class="fw-bold text-dark" style="font-size: 0.9rem;">Admin User</div>
                  <div class="text-muted" style="font-size: 0.75rem;">Administrator</div>
              </div>
              <i class="bi bi-person-circle fs-3 text-primary"></i>
          </a>
          <ul class="dropdown-menu dropdown-menu-end shadow-sm">
            
            <li><a class="dropdown-item text-danger" href="{{url_for('main.logout')}}">Logout</a></li>
          </ul>
        </div>
      </nav>

      <!-- Form Card -->
      <div class="card shadow-sm border-0">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="mb-0 fw-semibold">Doctor’s Information</h5>
            <a href="#" onclick="window.history.back()" class="btn btn-outline-secondary btn-sm">
              <i class="bi bi-arrow-left me-1"></i>Back to List
            </a>
          </div>

          <form action="#" method="POST" class="row g-4" id="add-doctor-panel">
            <!-- Full Name & Email -->
            <div class="col-md-6">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control" name="full_name" placeholder="Dr. John Doe" required />
            </div>
            <div class="col-md-6">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" name="email" placeholder="doctor@hms.com" required/>

            </div>

            <!-- Phone & Age -->
            <div class="col-md-6">
              <label class="form-label">Contact Number</label>
              <input type="tel" class="form-control" name="phone_number" placeholder="+91-1122334455" required />
            </div>
            <div class="col-md-6">
              <label class="form-label">Age</label>
              <input type="number" class="form-control" name="age" placeholder="35" required />
            </div>

            <!-- Department & Experience -->
            <div class="col-md-6">
              <label class="form-label">Department (Specialization)</label>
              <input type="text" class="form-control" name="specialization" placeholder="e.g., Cardiology" required />
            </div>
            <div class="col-md-6">
              <label class="form-label">Experience (Years)</label>
              <input type="number" class="form-control" name="experience_year" placeholder="10" required />
            </div>

            <!-- Gender -->
            <div class="col-6">
              <label class="form-label">Gender</label>
              <select class="form-select" name="gender" required>
                <option value="" selected disabled>Select Gender...</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Qualification</label>
              <input type="text" class="form-control" name="qualification" placeholder="e.g.: MBBS,MD..." required />
            </div>

            <!-- Bio -->
            <div class="col-12">
              <label class="form-label">Doctor's Bio</label>
              <textarea class="form-control" rows="4" name="bio" placeholder="Write a brief professional summary..." required></textarea>
            </div>

            <!-- Submit -->
            <div class="col-12 text-end">
              <button type="submit" class="btn btn-primary btn-submit">
                <i class="bi bi-check-circle-fill me-2"></i>Create Doctor Profile
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- Footer -->
      <footer class="footer text-center text-muted mt-4">
        © 2025 Hospital Management System | Add Doctor
      </footer>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
