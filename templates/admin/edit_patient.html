<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Patient | HMS Portal</title>

    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
  
    <link rel="stylesheet" href="../../static/css/admin/edit_patient.css">
    <link rel="stylesheet" href="../../static/css/style.css">
</head>

<body>
    <div class="wrapper">
        <!-- ======= SIDEBAR ======= -->
          <nav id="sidebar">
            <div class="sidebar-header d-flex align-items-center">
                <a class="navbar-brand fw-bold d-flex align-items-center" href="#">
                    <!-- Note: Update path as needed for your project structure -->
                    <img src="../../static/img/mad1.png" alt="HMS Logo" style="height: 35px;" class="me-2 rounded-circle">
                    <i class="bi bi-heart-pulse-fill me-2"></i>HMS Portal
                </a>
            </div>

            <ul class="list-unstyled components">
                <li>
                    <!-- Note: Add your url_for() link here -->
                    <a href="{{ url_for('admin_dashboard') }}"><i class="bi bi-grid-1x2-fill me-2"></i>Dashboard</a>
                </li>
                <li > <!-- <== SET THIS PAGE TO ACTIVE -->
                    <!-- Note: Add your url_for() link here -->
                    <a href="{{url_for('all_doctors')}}"><i class="bi bi-person-badge-fill me-2"></i>Doctors</a>
                </li>
                <li class="active">
                    <!-- Note: Add your url_for() link here -->
                    <a href="{{url_for('all_patients')}}"><i class="bi bi-people-fill me-2"></i>Patients</a>
                </li>
                <li>
                    <!-- Note: Add your url_for() link here -->
                    <a href="{{url_for('all_appointments')}}"><i class="bi bi-calendar-check-fill me-2"></i>Appointments</a>
                </li>
                
            </ul>
        </nav>

        <!-- ======= CONTENT WRAPPER (This was missing) ======= -->
        <div id="content">
            
            <!-- ======= TOP NAVBAR (Now inside #content) ======= -->
            <nav class="navbar navbar-expand-lg navbar-light top-navbar">
                <div class="container-fluid">
                    <h5 class="navbar-title mb-0">Edit Patient</h5>
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" role="button" data-bs-toggle="dropdown">
                                <div class="text-end me-2 d-none d-md-block">
                                    <div class="fw-bold text-dark" style="font-size: 0.9rem;">Admin User</div>
                                    <div class="text-muted" style="font-size: 0.75rem;">Administrator</div>
                                </div>
                                <i class="bi bi-person-circle fs-3 text-primary"></i>
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
                                <li><a class="dropdown-item text-danger" href="#">Logout</a></li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- ======= MAIN CONTENT (Now inside #content) ======= -->
            <div class="main-content">
                <div class="container-fluid p-0">
                    <div class="card content-panel">
                        <div class="card-body">
                            <div class="panel-header d-flex justify-content-between align-items-center mb-4">
                                <h5 class="mb-0">Patient Information</h5>
                                <a href="#" class="btn btn-outline-secondary btn-back" onclick="window.history.back()">
                                    <i class="bi bi-arrow-left me-1"></i>Back to List
                                </a>
                            </div>

                            <!-- ======= FORM ======= -->
                            <!-- Note: Add your url_for() action and method -->
                            <form action="#" method="POST">
                                <div class="row g-4">
                                    <div class="col-md-6">
                                        <label for="patientName" class="form-label">Full Name</label>
                                        <input type="text" class="form-control" id="patientName" name="full_name" value="Mr. Rohit" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="patientEmail" class="form-label">Email</label>
                                        <input type="email" class="form-control" id="patientEmail" name="email" value="rohit@example.com" disabled>
                                        <small class="text-muted">Email can't be changed.</small>
                                    </div>
                                </div>

                                <div class="row g-4 mt-3">
                                    <div class="col-md-6">
                                        <label for="patientPhone" class="form-label">Phone</label>
                                        <input type="tel" class="form-control" id="patientPhone" name="phone" value="+91 9876543210" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="patientAge" class="form-label">Age</I></label>
                                        <input type="number" class="form-control" id="patientAge" name="age" value="35" required>
                                    </div>
                                </div>
                                   <div class="text-end mt-4">
                                    <button type="submit" class="btn btn-primary btn-submit">
                                        <i class="bi bi-check-circle-fill me-2"></i>Save Changes
                                    </button>
                                    <button type="button" class="btn btn-secondary btn-cancel" onclick="window.history.back()">
                                        <i class="bi bi-x-circle me-2"></i>Cancel
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Footer (Now inside #content) -->
                <div class="footer mt-4 text-center text-muted">
                    © 2025 Hospital Management System | Edit Patient
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
