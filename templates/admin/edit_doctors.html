<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Doctor | HMS Portal</title>

  <!-- Bootstrap & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Custom Styles -->
  <link rel="stylesheet" href="../../static/css/admin/edit_doc.css" />
</head>
<body>
  <div class="wrapper">
    <!-- ===== SIDEBAR ===== -->
    <nav id="sidebar">
      <div class="sidebar-header text-center py-3 border-bottom">
        <a href="#" class="navbar-brand fw-bold d-flex align-items-center justify-content-center text-primary">
          <img src="../../static/img/mad1.png" alt="HMS Logo" class="me-2 rounded-circle" style="height: 35px;" />
          <span><i class="bi bi-heart-pulse-fill me-2"></i>HMS Portal</span>
        </a>
      </div>

      <ul class="list-unstyled components mt-3">
        <li><a href="#"><i class="bi bi-grid-1x2-fill me-2"></i>Dashboard</a></li>
        <li class="active"><a href="#"><i class="bi bi-person-badge-fill me-2"></i>Doctors</a></li>
        <li><a href="#"><i class="bi bi-people-fill me-2"></i>Patients</a></li>
        <li><a href="#"><i class="bi bi-calendar-check-fill me-2"></i>Appointments</a></li>
        <li><a href="#"><i class="bi bi-gear-fill me-2"></i>Settings</a></li>
      </ul>
    </nav>

    <!-- ===== MAIN CONTENT ===== -->
    <div id="content">
      <!-- Top Navbar -->
      <nav class="top-navbar d-flex justify-content-between align-items-center mb-4 px-3 py-2 shadow-sm">
        <h5 class="mb-0 fw-semibold">Edit Doctor</h5>
        <div class="dropdown">
          <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle fs-4 text-primary"></i>
          </a>
          <ul class="dropdown-menu dropdown-menu-end shadow-sm">
            <li><a class="dropdown-item" href="#">Profile</a></li>
            <li><a class="dropdown-item" href="#">Settings</a></li>
            <li><hr class="dropdown-divider" /></li>
            <li><a class="dropdown-item text-danger" href="#">Logout</a></li>
          </ul>
        </div>
      </nav>

      <!-- ===== EDIT FORM CARD ===== -->
      <div class="card shadow-sm border-0">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="mb-0 fw-semibold">Edit Doctor Details</h5>
            <a href="#" onclick="window.history.back()" class="btn btn-outline-secondary btn-sm">
              <i class="bi bi-arrow-left me-1"></i>Back to List
            </a>
          </div>

          <form id="edit-doctor-form" class="row g-4">
            <!-- Full Name -->
            <div class="col-md-6">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control" id="doctorName" value="Dr. Abcde" required />
            </div>

            <!-- Department -->
            <div class="col-md-6">
              <label class="form-label">Department</label>
              <input type="text" class="form-control" id="doctorDept" value="Cardiology Department" required />
            </div>

            <!-- Experience -->
            <div class="col-md-6">
              <label class="form-label">Experience (Years)</label>
              <input type="number" class="form-control" id="doctorExp" value="10" min="0" required />
            </div>

            <!-- Email -->
            <div class="col-md-6">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="doctorEmail" value="abcde@hospital.com" readonly />
              <small class="form-text text-muted">You can't edit this email</small>
            </div>

            <!-- Phone -->
            <div class="col-md-6">
              <label class="form-label">Phone</label>
              <input type="tel" class="form-control" id="doctorPhone" value="+91 9876543210" required />
            </div>

            <!-- Buttons -->
            <div class="col-12 d-flex justify-content-end gap-2 mt-3">
              <button type="submit" class="btn btn-primary btn-submit">
                <i class="bi bi-save-fill me-2"></i>Save Changes
              </button>
              <button type="button" class="btn btn-outline-secondary btn-cancel" onclick="window.history.back()">
                <i class="bi bi-x-circle me-2"></i>Cancel
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- Footer -->
      <footer class="footer text-center text-muted mt-4">
        © 2025 Hospital Management System | Edit Doctor
      </footer>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
